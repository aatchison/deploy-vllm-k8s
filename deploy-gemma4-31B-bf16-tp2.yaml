# Gemma 4 31B (31B params, BF16 full precision, Tensor Parallel across 2 MIG slices)
# Uses 4g.96gb (GPU 0) + 4g.96gb (GPU 1) = 192GB combined
# Weights split ~31GB per GPU; ~60GB KV headroom per slice → supports 128K context
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app: vllm
spec:
  replicas: 1
  progressDeadlineSeconds: 2400
  selector:
    matchLabels:
      app: vllm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm
        model: gemma-4-31B-it
    spec:
      containers:
      - name: vllm
        image: docker.io/library/vllm-gemma4:local
        imagePullPolicy: Never
        args:
        - "--model"
        - "google/gemma-4-31B-it"
        - "--dtype"
        - "bfloat16"
        - "--tensor-parallel-size"
        - "2"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "262144"
        - "--gpu-memory-utilization"
        - "0.95"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "gemma4"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: HF_HOME
          value: /models/huggingface
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-4g.96gb: "2"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 1800
          periodSeconds: 30
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 15
          failureThreshold: 60
      tolerations:
      - key: nvidia.com/mig-4g.96gb
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
