---
apiVersion: v1
kind: Namespace
metadata:
  name: vllm

---
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: vllm
type: Opaque
stringData:
  token: "YOUR_HUGGINGFACE_TOKEN_HERE"

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vllm-nfs-pv
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.0.0.61
    path: /vllm-models
  mountOptions:
    - nfsvers=4.1
    - rsize=262144
    - wsize=262144

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: vllm
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Ti
  volumeName: vllm-nfs-pv

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
  namespace: vllm
spec:
  selector:
    app: vllm
  type: NodePort
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30800
