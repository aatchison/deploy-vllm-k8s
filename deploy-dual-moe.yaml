  progressDeadlineSeconds: 1800
  selector:
    matchLabels:
      app: vllm-31b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-31b
        model: gemma-4-31B-it
    spec:
      containers:
      - name: vllm
        image: docker.io/library/vllm-gemma4:local
        imagePullPolicy: Never
        args:
        - "--model"
        - "nvidia/Gemma-4-31B-IT-NVFP4"
        - "--quantization"
        - "nvfp4"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "131072"
        - "--gpu-memory-utilization"
        - "0.95"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "gemma4"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: HF_HOME
          value: /models/huggingface
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-4g.96gb: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 1200
          periodSeconds: 30
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 15
          failureThreshold: 40
      tolerations:
      - key: nvidia.com/mig-4g.96gb
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-31b-svc
  namespace: vllm
spec:
  selector:
    app: vllm-31b
  type: NodePort
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30802
