# Run E2B, E4B, and 31B simultaneously across both GPUs.
# GPU 0 (mig-2g.48gb x2): E2B + E4B
# GPU 1 (mig-4g.96gb x1): 31B NVFP4
#
#   E2B endpoint: http://<node>:30801/v1
#   E4B endpoint: http://<node>:30802/v1
#   31B endpoint: http://<node>:30803/v1

---
# --- E2B ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-e2b
  namespace: vllm
  labels:
    app: vllm-e2b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-e2b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-e2b
        model: gemma-4-E2B-it
    spec:
      containers:
      - name: vllm
        image: docker.io/library/vllm-gemma4:local
        imagePullPolicy: Never
        args:
        - "--model"
        - "bg-digitalservices/Gemma-4-E2B-it-NVFP4"
        - "--quantization"
        - "nvfp4"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "32768"
        - "--gpu-memory-utilization"
        - "0.90"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "gemma4"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: HF_HOME
          value: /models/huggingface
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-2g.48gb: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 30
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 30
      tolerations:
      - key: nvidia.com/mig-2g.48gb
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-e2b-svc
  namespace: vllm
spec:
  selector:
    app: vllm-e2b
  type: NodePort
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30801

---
# --- E4B ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-e4b
  namespace: vllm
  labels:
    app: vllm-e4b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-e4b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-e4b
        model: gemma-4-E4B-it
    spec:
      containers:
      - name: vllm
        image: docker.io/library/vllm-gemma4:local
        imagePullPolicy: Never
        args:
        - "--model"
        - "google/gemma-4-E4B-it"
        - "--dtype"
        - "bfloat16"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "32768"
        - "--gpu-memory-utilization"
        - "0.90"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "gemma4"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: HF_HOME
          value: /models/huggingface
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-2g.48gb: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 480
          periodSeconds: 30
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 30
      tolerations:
      - key: nvidia.com/mig-2g.48gb
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-e4b-svc
  namespace: vllm
spec:
  selector:
    app: vllm-e4b
  type: NodePort
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30802

---
# --- 31B (4g.96gb, 128K context) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-31b
  namespace: vllm
  labels:
    app: vllm-31b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-31b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-31b
        model: gemma-4-31B-it
    spec:
      containers:
      - name: vllm
        image: docker.io/library/vllm-gemma4:local
        imagePullPolicy: Never
        args:
        - "--model"
        - "nvidia/Gemma-4-31B-IT-NVFP4"
        - "--quantization"
        - "nvfp4"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "131072"
        - "--gpu-memory-utilization"
        - "0.95"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "gemma4"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: HF_HOME
          value: /models/huggingface
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-4g.96gb: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 1200
          periodSeconds: 30
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 15
          failureThreshold: 40
      tolerations:
      - key: nvidia.com/mig-4g.96gb
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-31b-svc
  namespace: vllm
spec:
  selector:
    app: vllm-31b
  type: NodePort
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30803
