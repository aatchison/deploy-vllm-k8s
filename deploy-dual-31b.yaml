# Run 31B BF16 on both mig-4g.96gb slices simultaneously.
# Requires MIG layout: both GPUs configured as 1x 4g.96gb.
# ~62GB weights per slice leave ~29GB for KV cache — 65K ctx each.
#
#   31B-A endpoint: http://<node>:30801/v1  (google/gemma-4-31B-it BF16, 65K ctx)
#   31B-B endpoint: http://<node>:30802/v1  (google/gemma-4-31B-it BF16, 65K ctx)

---
# --- 31B BF16 - slice A (GPU 0) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-31b-a
  namespace: vllm
  labels:
    app: vllm-31b-a
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  selector:
    matchLabels:
      app: vllm-31b-a
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-31b-a
        model: gemma-4-31B-it
    spec:
      containers:
      - name: vllm
        image: docker.io/library/vllm-gemma4:local
        imagePullPolicy: Never
        args:
        - "--model"
        - "google/gemma-4-31B-it"
        - "--served-model-name"
        - "gemma-4-31b-bf16"
        - "--dtype"
        - "bfloat16"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "65536"
        - "--gpu-memory-utilization"
        - "0.95"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "gemma4"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: HF_HOME
          value: /models/huggingface
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-4g.96gb: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 1200
          periodSeconds: 30
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 15
          failureThreshold: 40
      tolerations:
      - key: nvidia.com/mig-4g.96gb
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-31b-a-svc
  namespace: vllm
spec:
  selector:
    app: vllm-31b-a
  type: NodePort
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30801

