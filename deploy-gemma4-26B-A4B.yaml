# Gemma 4 26B-A4B (26B MoE, 4B active params)
# Uses pre-quantized NVFP4 variant (W4A4) — bitsandbytes does not support MoE models in vLLM.
# FP8 weights ~26GB — bitsandbytes and NVFP4 community checkpoints both fail for this MoE model.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app: vllm
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  selector:
    matchLabels:
      app: vllm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm
        model: gemma-4-26B-A4B-it
    spec:
      containers:
      - name: vllm
        image: docker.io/library/vllm-gemma4:local
        imagePullPolicy: Never
        args:
        - "--model"
        - "protoLabsAI/gemma-4-26B-A4B-it-FP8"
        - "--quantization"
        - "fp8"
        - "--port"
        - "8000"
        - "--max-model-len"
        - "32768"
        - "--gpu-memory-utilization"
        - "0.92"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - name: HF_HOME
          value: /models/huggingface
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-2g.48gb: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 900
          periodSeconds: 30
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 40
      tolerations:
      - key: nvidia.com/mig-2g.48gb
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
